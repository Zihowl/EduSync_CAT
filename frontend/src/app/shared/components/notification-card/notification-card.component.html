<ion-card [ngClass]="['notification-card', 'notification-card--' + styleType]" [attr.role]="actions.length ? 'alertdialog' : 'alert'" aria-live="assertive">
  <ion-card-content class="notification-card-content">
    <ion-button *ngIf="showClose" type="button" fill="clear" class="notification-card-close" aria-label="Cerrar notificación" (click)="close()">×</ion-button>
    <div class="notification-card-body">
      <ion-icon class="notification-card-icon" [name]="icon"></ion-icon>
      <div class="notification-card-text">
        <strong>{{ title }}</strong>
        <p>
          {{ message }}
          <span *ngIf="countdown !== undefined" class="notification-card-countdown"><br/>Intenta de nuevo en {{ countdown }} segundos.</span>
        </p>
      </div>
    </div>
    <div *ngIf="actions.length" class="notification-card-actions">
      <ion-button
        *ngFor="let action of actions"
        type="button"
        [fill]="action.fill || 'outline'"
        [color]="action.color || 'primary'"
        [attr.aria-label]="action.ariaLabel || action.label"
        (click)="triggerAction(action)">
        {{ action.label }}
      </ion-button>
    </div>
  </ion-card-content>
</ion-card>
