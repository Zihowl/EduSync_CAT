<div class="menu-card__content">
    <ion-icon [name]="card.icon" class="menu-card__icon" aria-hidden="true"></ion-icon>

    <div class="menu-card__body">
        <h2 class="menu-card__title">{{ card.title }}</h2>
        <p class="menu-card__description">{{ card.description }}</p>
    </div>

    <ion-icon
        name="chevron-forward-outline"
        class="menu-card__chevron"
        aria-hidden="true">
    </ion-icon>
</div>
<ion-ripple-effect></ion-ripple-effect>
