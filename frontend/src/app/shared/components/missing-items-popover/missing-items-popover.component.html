<ion-header class="missing-popover__header">
  <ion-toolbar>
    <ion-title>
      <span>{{ activeTitle() }}</span>
      <small>{{ activeTotal() }} {{ activePlural() }}</small>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" size="small" (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="missing-popover-content">
  <section class="missing-popover__summary">
    <p>{{ activeHint() }}</p>
  </section>

  <label class="missing-popover__search">
    <ion-icon name="search-outline"></ion-icon>
    <input type="search" [(ngModel)]="searchText" placeholder="Buscar por nombre, clave o fila" />
  </label>

  <div class="missing-popover__list" *ngIf="itemsForActiveCategory().length > 0; else emptyState">
    <article
      class="missing-popover__item"
      *ngFor="let item of itemsForActiveCategory()">

      <div class="missing-popover__item-copy">
        <strong>{{ labelFor(item) }}</strong>
        <span>{{ metaFor(item) }}</span>
        <span>{{ detailsFor(item) }}</span>
        <em>{{ rowsLabel(item) }}</em>
      </div>
    </article>
  </div>

  <ng-template #emptyState>
    <div class="missing-popover__empty">
      <strong>Sin resultados</strong>
      <span>Ajusta la búsqueda o revisa otra categoría.</span>
    </div>
  </ng-template>
</ion-content>

<!-- footer removed: popover is now a read-only compact list -->
