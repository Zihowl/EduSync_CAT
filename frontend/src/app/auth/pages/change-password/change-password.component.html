<ion-header class="ion-no-border login-header">
    <ion-toolbar class="login-toolbar">
        <ion-title class="login-title">EduSync CAT</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding login-content">
    <div class="login-container">
        <app-notification-card
            *ngIf="errorMessage"
            [title]="errorTitle || 'Error'"
            [message]="errorMessage"
            [icon]="errorIcon"
            [styleType]="errorStyle"
            [autoDismissMs]="errorCardAutoDismissMs"
            (closed)="resetError()"
        ></app-notification-card>

        <app-auth-card cardTitle="Cambio de Credenciales" subtitle="Actualiza tu email y contraseña temporal" cardClass="login-card">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="on">
                <div class="form-group">
                    <label class="field-label" for="current_email">Correo actual</label>
                    <input id="current_email" class="native-login-input email-input" formControlName="current_email" type="email" autocomplete="username" />
                </div>

                <div class="form-group">
                    <label class="field-label" for="current_password">Contraseña actual</label>
                    <input id="current_password" class="native-login-input password-input" formControlName="current_password" type="password" autocomplete="current-password" />
                </div>

                <div class="form-group">
                    <label class="field-label" for="new_email">Nuevo correo</label>
                    <input id="new_email" class="native-login-input email-input" formControlName="new_email" type="email" autocomplete="email" />
                </div>

                <div class="form-group">
                    <label class="field-label" for="new_password">Nueva contraseña</label>
                    <input id="new_password" class="native-login-input password-input" formControlName="new_password" type="password" autocomplete="new-password" />
                </div>

                <div class="form-group">
                    <label class="field-label" for="confirm_password">Confirmar contraseña</label>
                    <input id="confirm_password" class="native-login-input password-input" formControlName="confirm_password" type="password" autocomplete="new-password" />
                </div>

                <ion-button expand="block" type="submit" [disabled]="form.invalid || isLoading">
                    {{ isLoading ? 'Actualizando...' : 'Actualizar credenciales' }}
                </ion-button>
            </form>
        </app-auth-card>
    </div>
</ion-content>
