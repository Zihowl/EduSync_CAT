<app-page-header title="EduSync CAT"></app-page-header>

<ion-content class="ion-padding login-content">
    <div class="login-container">
        <app-auth-card #authCard="appAuthCard" cardTitle="Cambio de Credenciales" subtitle="Actualiza la información de tu cuenta" cardClass="login-card">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="on">
                <div class="form-group">
                    <label class="field-label" for="current_email">Correo actual</label>
                    <input id="current_email" class="native-login-input email-input" formControlName="current_email" type="email" autocomplete="username" readonly />
                </div>

                <div class="form-group">
                    <label class="field-label" [class.error]="currentPasswordControl?.invalid && currentPasswordControl?.touched" for="current_password">
                        Contraseña actual
                        <span
                            class="field-validation-container"
                            [class.popover-visible]="authCard.getPopoverVisible('current_password')"
                            (click)="authCard.toggleFieldPopover($event, 'current_password')"
                        >
                            <span class="field-icon">⚠</span>
                            <span class="popover-message" role="tooltip">{{ authCard.getFieldValidationMessage(currentPasswordControl, 'password') }}</span>
                        </span>
                    </label>
                    <input id="current_password" class="native-login-input password-input" formControlName="current_password" type="password" autocomplete="current-password" />
                </div>

                <div class="form-group" *ngIf="canChangeEmail">
                    <label class="field-label" [class.error]="newEmailControl?.invalid && newEmailControl?.touched" for="new_email">
                        Nuevo correo
                        <span
                            class="field-validation-container"
                            [class.popover-visible]="authCard.getPopoverVisible('new_email')"
                            (click)="authCard.toggleFieldPopover($event, 'new_email')"
                        >
                            <span class="field-icon">⚠</span>
                            <span class="popover-message" role="tooltip">{{ authCard.getFieldValidationMessage(newEmailControl, 'email') }}</span>
                        </span>
                    </label>
                    <input id="new_email" class="native-login-input email-input" formControlName="new_email" type="email" autocomplete="email" />
                </div>

                <div class="form-group">
                    <label class="field-label" [class.error]="newPasswordControl?.invalid && newPasswordControl?.touched" for="new_password">
                        Nueva contraseña
                        <span
                            class="field-validation-container"
                            [class.popover-visible]="authCard.getPopoverVisible('new_password')"
                            (click)="authCard.toggleFieldPopover($event, 'new_password')"
                        >
                            <span class="field-icon">⚠</span>
                            <span class="popover-message" role="tooltip">{{ authCard.getFieldValidationMessage(newPasswordControl, 'password') }}</span>
                        </span>
                    </label>
                    <input id="new_password" class="native-login-input password-input" formControlName="new_password" type="password" autocomplete="new-password" />
                </div>

                <div class="form-group">
                    <label class="field-label" [class.error]="(confirmPasswordControl?.invalid || form.hasError('passwordMismatch')) && confirmPasswordControl?.touched" for="confirm_password">
                        Confirmar contraseña
                        <span
                            class="field-validation-container"
                            [class.popover-visible]="authCard.getPopoverVisible('confirm_password')"
                            (click)="authCard.toggleFieldPopover($event, 'confirm_password')"
                        >
                            <span class="field-icon">⚠</span>
                            <span class="popover-message" role="tooltip">{{ authCard.getFieldValidationMessage(confirmPasswordControl, 'confirm_password') }}</span>
                        </span>
                    </label>
                    <input id="confirm_password" class="native-login-input password-input" formControlName="confirm_password" type="password" autocomplete="new-password" />
                </div>

                <ion-button expand="block" type="submit" [disabled]="form.invalid || isLoading || authCard.isLockoutActive">
                    {{ authCard.getActionButtonLabel('Actualizar credenciales', isLoading) }}
                </ion-button>
            </form>
        </app-auth-card>
    </div>
</ion-content>
