<ion-header>
    <ion-toolbar color="primary">
        <ion-title class="login-title">EduSync CAT</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding login-content">
    <div class="login-container">
        <ion-card class="login-card">
            <ion-card-content>
                <div class="text-center">
                    <h1>Bienvenido</h1>
                    <p class="text-muted">Ingresa tus credenciales de administrador</p>
                </div>
                <form [formGroup]="loginForm" (ngSubmit)="OnSubmit()">
                    <div class="form-group">
                        <ion-input
                            label="Correo Institucional"
                            label-placement="floating"
                            fill="outline"
                            formControlName="email"
                            type="email"
                            placeholder="usuario@dominio">
                        </ion-input>
                    </div>

                    <div class="form-group">
                        <ion-input
                            label="Contraseña"
                            label-placement="floating"
                            fill="outline"
                            formControlName="password"
                            type="password">
                        </ion-input>
                    </div>

                    <ion-button expand="block" type="submit" [disabled]="loginForm.invalid || isLoading">
                        {{ isLoading ? 'Verificando...' : 'Iniciar Sesión' }}
                    </ion-button>
                </form>
            </ion-card-content>
        </ion-card>
    </div>
</ion-content>
