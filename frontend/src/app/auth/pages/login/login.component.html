<app-page-header title="EduSync CAT"></app-page-header>

<ion-content class="ion-padding login-content">
    <div class="login-container">
        <app-auth-card #authCard="appAuthCard" cardTitle="Hola!" subtitle="Ingresa tus credenciales de administrador" cardClass="login-card">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="on">
                <div class="form-group">
                    <label class="field-label" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" for="login-email">
                        Correo Institucional
                        <span
                            class="field-validation-container"
                            [class.popover-visible]="authCard.getPopoverVisible('email')"
                            (click)="authCard.toggleFieldPopover($event, 'email')">
                            <span class="field-icon">⚠</span>
                            <span class="popover-message" role="tooltip">{{ authCard.getFieldValidationMessage(emailControl, 'email') }}</span>
                        </span>
                    </label>
                    <input
                        id="login-email"
                        class="native-login-input email-input"
                        formControlName="email"
                        name="username"
                        type="email"
                        inputmode="email"
                        autocomplete="username"
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false"
                        placeholder="usuario@dominio.extensión" />

                </div>

                <div class="form-group">
                    <label class="field-label" for="login-password">Contraseña</label>
                    <input
                        id="login-password"
                        class="native-login-input password-input"
                        formControlName="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        spellcheck="false"
                        enterkeyhint="go" />
                    <span
                        class="field-validation-container"
                        [class.popover-visible]="authCard.getPopoverVisible('password')"
                        (click)="authCard.toggleFieldPopover($event, 'password')"
                    >
                        <span class="field-icon">⚠</span>
                        <span class="popover-message" role="tooltip">{{ authCard.getFieldValidationMessage(passwordControl, 'password') }}</span>
                    </span>
                </div>

                <ion-button expand="block" type="submit" [disabled]="loginForm.invalid || isLoading || authCard.isLockoutActive">
                    {{ authCard.getActionButtonLabel('Iniciar Sesión', isLoading) }}
                </ion-button>
            </form>
        </app-auth-card>
    </div>
    <footer class="login-footer">
        <p>© {{ currentYear }} Zihowl • GPLv3+</p>
        <p>¡Contribuye al proyecto! Disponible en <a href="https://github.com/Zihowl/EduSync_CAT" target="_blank" rel="noopener noreferrer">GitHub</a>.</p>
    </footer>
</ion-content>
