<ion-header class="ion-no-border login-header">
    <ion-toolbar class="login-toolbar">
        <ion-title class="login-title">EduSync CAT</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding login-content">
    <div class="login-container">
        <ion-card class="login-card">
            <ion-card-content>
                <div class="text-center">
                    <h1>Hola!</h1>
                    <p class="text-muted">Ingresa tus credenciales de administrador</p>
                </div>
                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="on">
                    <div class="form-group">
                        <label class="field-label" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" for="login-email">
                            Correo Institucional
                            <span class="field-icon" [attr.title]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched ? 'Formato invalido: usuario@dominio.extensión' : ''">⚠</span>
                        </label>
                        <input
                            id="login-email"
                            class="native-login-input email-input"
                            formControlName="email"
                            name="username"
                            type="email"
                            inputmode="email"
                            autocomplete="username"
                            autocapitalize="off"
                            autocorrect="off"
                            spellcheck="false"
                            placeholder="usuario@dominio.extensión" />
                    </div>

                    <div class="form-group">
                        <label class="field-label" for="login-password">Contraseña</label>
                        <input
                            id="login-password"
                            class="native-login-input password-input"
                            formControlName="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            spellcheck="false"
                            enterkeyhint="go" />
                    </div>

                    <div *ngIf="isLockoutActive" class="lockout-info">
                        <p>
                            Acceso bloqueado temporalmente.<br>
                            Intenta de nuevo en {{ lockoutRemainingSeconds }} segundos.
                        </p>
                    </div>

                    <ion-button expand="block" type="submit" [disabled]="loginForm.invalid || isLoading || isLockoutActive">
                        Iniciar Sesión
                    </ion-button>
                </form>
            </ion-card-content>
        </ion-card>
    </div>
    <div class="login-footer">
        <p>© {{ currentYear }} Zihowl • GPLv3+</p>
        <p>Contribuye al proyecto!, disponible en  <a href="https://github.com/Zihowl/EduSync_CAT" target="_blank">Github</a>.</p>
    </div>
</ion-content>
